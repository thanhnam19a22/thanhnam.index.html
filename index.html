<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Học trực tuyến CNTT</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .menu {
            width: 220px;
            background: #ddd;
            border-right: 1px solid #999;
        }
        
        .menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .menu li {
            padding: 15px;
            border-bottom: 1px solid #bbb;
        }
        
        .menu li:first-child {
            background: #999;
            color: white;
            font-weight: bold;
        }
        
        .content {
            padding: 20px;
            flex: 1;
        }
        
        h1 {
            margin-top: 0;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="menu">
            <ul>
                <li>Trang chủ</li>
                <li>Khóa học</li>
                <li>Diễn đàn</li>
                <li>Liên hệ</li>
            </ul>
        </div>

        <div class="content">
            <h1>Học trực tuyến Công nghệ thông tin</h1>

            <h3>Các khóa học:</h3>

            <ol>
                <li>Lập trình cơ bản</li>
                <li>Cấu trúc dữ liệu</li>
                <li>Thiết kế web</li>
            </ol>
        </div>

    </div>

</body>

</html>
